services:
  api:
    image: node:20-bookworm
    working_dir: /workspace
    env_file:
      - .env
      - apps/api/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-no-verify}
      N8N_API_KEY: ${N8N_API_KEY:-change_me_n8n_api_key}
      N8N_HOST: ${N8N_HOST:-https://n8n.drascom.uk}
      N8N_LLM_WORKFLOW_ID: ${N8N_LLM_WORKFLOW_ID:-6KFFgjd26nF0kNCA}
      N8N_MCP_WORKFLOW_ID: ${N8N_MCP_WORKFLOW_ID:-XYiIkxpa4PlnddQt}
    volumes:
      - ./:/workspace
      - coziyoo_npm_cache:/root/.npm
      - coziyoo_api_node_modules:/workspace/node_modules
    command: >
      bash -lc "npm ci --workspace=apps/api --include-workspace-root && npm run dev:api"
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  admin:
    image: node:20-bookworm
    working_dir: /workspace
    env_file:
      - .env
      - apps/admin/.env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      VITE_API_BASE_URL: http://localhost:3000
    volumes:
      - ./:/workspace
      - coziyoo_npm_cache:/root/.npm
      - coziyoo_admin_node_modules:/workspace/node_modules
    command: >
      bash -lc "npm ci --workspace=apps/admin --include-workspace-root && npm run dev --workspace=apps/admin -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  coziyoo_npm_cache:
  coziyoo_api_node_modules:
  coziyoo_admin_node_modules:
