services:
  api:
    image: node:20-bookworm
    working_dir: /workspace
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      AI_SERVER_URL: ${DEV_AI_SERVER_URL:-http://voice-agent-api:9000}
    volumes:
      - ./:/workspace
      - coziyoo_npm_cache:/root/.npm
    command: >
      bash -lc "npm ci && npm run dev:api"
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - voice-agent-api

  admin:
    image: node:20-bookworm
    working_dir: /workspace
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./:/workspace
      - coziyoo_npm_cache:/root/.npm
    command: >
      bash -lc "npm ci && npm run dev:admin -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  voice-agent-api:
    image: python:3.12-bookworm
    working_dir: /workspace/apps/voice-agent
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      AI_SERVER_HOST: 0.0.0.0
      AI_SERVER_PORT: "9000"
      API_BASE_URL: http://api:3000
    volumes:
      - ./:/workspace
      - coziyoo_pip_cache:/root/.cache/pip
    command: >
      bash -lc "pip install -e . && uvicorn voice_agent.join_api:app --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"

  voice-agent-worker:
    image: python:3.12-bookworm
    working_dir: /workspace/apps/voice-agent
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      API_BASE_URL: http://api:3000
    volumes:
      - ./:/workspace
      - coziyoo_pip_cache:/root/.cache/pip
    command: >
      bash -lc "pip install -e . && python -m voice_agent.entrypoint"
    depends_on:
      - api

  postgres:
    image: postgres:16
    profiles:
      - local-db
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-coziyoo}
    ports:
      - "5432:5432"
    volumes:
      - coziyoo_postgres_data:/var/lib/postgresql/data

volumes:
  coziyoo_npm_cache:
  coziyoo_pip_cache:
  coziyoo_postgres_data:
