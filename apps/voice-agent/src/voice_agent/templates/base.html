<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Coziyoo Voice Agent{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    (function () {
      try {
        var key = "cz_theme";
        var saved = localStorage.getItem(key);
        var theme = saved === "light" || saved === "dark" ? saved : "dark";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (_err) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <style>
    :root {
      --bg:        #020817;
      --card-bg:   #020817;
      --border:    #1e293b;
      --muted-fg:  #94a3b8;
      --text:      #f8fafc;
      --primary:   #37aa9d;
      --btn-bg:    rgba(30,41,59,.5);
      --btn-bg-hover: rgba(30,41,59,.9);
      --input-bg:  rgba(2,8,23,.8);
      --sidebar-item-fg: rgba(248,250,252,.65);
      --p10:       rgba(55,170,157,.10);
      --p20:       rgba(55,170,157,.20);
      --radius:    .5rem;
      --sw:        220px;
      --swc:       46px;
    }
    :root[data-theme="light"] {
      --bg:        #f8fafc;
      --card-bg:   #ffffff;
      --border:    #cbd5e1;
      --muted-fg:  #475569;
      --text:      #0f172a;
      --primary:   #0f766e;
      --btn-bg:    #f1f5f9;
      --btn-bg-hover: #e2e8f0;
      --input-bg:  #ffffff;
      --sidebar-item-fg: #334155;
      --p10:       rgba(15,118,110,.10);
      --p20:       rgba(15,118,110,.20);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 14px; line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; color: inherit; }

    /* ── Shell ── */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sw); min-width: var(--sw); height: 100vh;
      background: var(--bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width .2s ease, min-width .2s ease; flex-shrink: 0;
    }
    .sidebar.collapsed { width: var(--swc); min-width: var(--swc); }
    .sidebar-inner { display: flex; flex-direction: column; height: 100%; padding: 8px; overflow: hidden; }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px 10px; }
    .sidebar-logo-wrap { display: flex; align-items: center; gap: 8px; overflow: hidden; flex: 1; min-width: 0; }
    .sidebar-logo-icon {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--p10); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-logo-text { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; }
    .sidebar-toggle {
      width: 28px; height: 28px; flex-shrink: 0;
      background: none; border: 1px solid transparent; color: var(--muted-fg);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .sidebar-toggle:hover { background: rgba(248,250,252,.05); border-color: var(--border); }
    .sidebar-org {
      display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 6px;
      border: 2px solid var(--border); background: none; cursor: default;
      width: 100%; margin-bottom: 8px; min-height: 32px; overflow: hidden;
    }
    .sidebar-org-avatar {
      width: 20px; height: 20px; background: var(--p10); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--primary); flex-shrink: 0;
    }
    .sidebar-org-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sidebar-section {
      display: flex; align-items: center; padding: 10px 6px 3px;
      font-family: "Menlo","Monaco",monospace; font-size: 11px;
      color: rgba(248,250,252,.35); white-space: nowrap; overflow: hidden;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px; padding: 2px 4px; margin: 1px 0;
      border-radius: 6px; border: 1px solid transparent; cursor: pointer;
      color: var(--sidebar-item-fg); width: 100%; min-height: 30px; overflow: hidden;
      transition: background .1s, border-color .1s, color .1s; text-align: left; background: none;
    }
    .sidebar-item:hover { background: var(--p10); border-color: rgba(55,170,157,.12); color: var(--text); }
    .sidebar-item.active { background: var(--p10); border-color: rgba(55,170,157,.12); color: var(--text); }
    .sidebar-item-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-item.active .sidebar-item-icon svg, .sidebar-item:hover .sidebar-item-icon svg { fill: var(--primary); }
    .sidebar-item-label { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; flex: 1; }
    .sidebar-footer { padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }

    /* collapsed state */
    .sidebar.collapsed .sidebar-logo-text,
    .sidebar.collapsed .sidebar-org-name,
    .sidebar.collapsed .sidebar-item-label { display: none; }
    .sidebar.collapsed .sidebar-section { visibility: hidden; height: 4px; padding: 0; margin: 2px 0; }
    .sidebar.collapsed .sidebar-item { justify-content: center; gap: 0; }
    .sidebar.collapsed .sidebar-org { justify-content: center; }
    .sidebar.collapsed .sidebar-header { justify-content: center; padding-top: 10px; }
    .sidebar.collapsed .sidebar-logo-wrap { flex: 0; }

    /* ── Main ── */
    .main-content { flex: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Mobile ── */
    .top-bar {
      display: none; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 48px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .hamburger { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; }
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .sidebar.mobile-open {
        display: flex; position: fixed; z-index: 100; top: 0; left: 0; height: 100%;
        width: var(--sw) !important; min-width: var(--sw) !important;
        box-shadow: 8px 0 32px rgba(0,0,0,.7);
      }
      .top-bar { display: flex; }
    }

    /* ── Page layout ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--bg);
    }
    .page-title { font-size: 15px; font-weight: 600; }
    .page-body { flex: 1; overflow-y: auto; padding: 20px; }

    /* two-panel */
    .two-panel { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .panel-list {
      width: 280px; min-width: 280px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-editor { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }

    /* assistant list */
    .asst-list-header { padding: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .asst-list-items { flex: 1; overflow-y: auto; padding: 6px; }
    .asst-list-items::-webkit-scrollbar { width: 4px; }
    .asst-list-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .asst-row {
      padding: 9px 10px; border-radius: 7px; border: 1px solid transparent;
      margin-bottom: 2px; transition: background .1s, border-color .1s;
    }
    .asst-row:hover { background: rgba(248,250,252,.04); border-color: var(--border); }
    .asst-row.selected { background: var(--p10); border-color: rgba(55,170,157,.2); }
    .asst-row-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .asst-name-btn { flex: 1; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 500; text-align: left; padding: 0; }
    .asst-actions { display: flex; gap: 4px; }

    /* editor */
    .editor-action-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .editor-name-input {
      background: none; border: none; color: var(--text); font-size: 15px;
      font-weight: 600; outline: none; flex: 1; padding: 0; min-width: 0;
    }
    .editor-name-input:focus { color: var(--primary); }
    .editor-tabs {
      display: flex; padding: 0 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .editor-tab {
      padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--muted-fg);
      border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color .15s, border-color .15s;
    }
    .editor-tab:hover { color: var(--text); }
    .editor-tab.active { color: var(--text); border-bottom-color: var(--primary); }
    .editor-tab-content { padding: 16px; }
    .editor-placeholder {
      display: flex; align-items: center; justify-content: center;
      flex: 1; min-height: 300px;
    }

    /* placeholder pages */
    .coming-soon {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; gap: 14px; text-align: center; padding: 60px 40px;
    }
    .coming-soon svg { opacity: .12; }
    .coming-soon h3 { color: var(--muted-fg); font-size: 17px; font-weight: 600; }
    .coming-soon p { color: var(--muted-fg); font-size: 13px; max-width: 320px; line-height: 1.65; }
    .coming-soon-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 600;
      background: var(--p10); color: var(--primary); border: 1px solid rgba(55,170,157,.2);
    }

    /* ── UI primitives ── */
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border); background: var(--btn-bg);
      color: var(--text); border-radius: 6px; padding: 6px 12px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: border-color .15s, background .15s; white-space: nowrap;
    }
    .btn:hover { border-color: rgba(148,163,184,.35); background: var(--btn-bg-hover); }
    .btn:disabled { opacity: .4; pointer-events: none; }
      .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
      .btn-primary:hover { background: #2e9990; border-color: #2e9990; }
      .btn-save {
        transition: transform .08s ease, box-shadow .2s ease, filter .2s ease;
      }
      .btn-save:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(46,153,144,.28);
      }
      .btn-save:active,
      .btn-save.is-saving {
        transform: translateY(0) scale(.97);
        box-shadow: 0 2px 8px rgba(46,153,144,.35);
      }
      .btn-save.is-saving {
        filter: saturate(.85);
      }
      .btn-danger { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.25); color: #fca5a5; }
    .btn-danger:hover { background: rgba(239,68,68,.18); border-color: #ef4444; }
    .btn-sm { padding: 3px 8px; font-size: 12px; }
    .btn-icon { padding: 5px; width: 28px; height: 28px; justify-content: center; }
    .input {
      width: 100%; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 13px;
      transition: border-color .15s; outline: none;
    }
    .input:focus { border-color: rgba(55,170,157,.5); box-shadow: 0 0 0 2px rgba(55,170,157,.07); }
    .input::placeholder { color: var(--muted-fg); }
    select.input { cursor: pointer; }
    textarea.input { resize: vertical; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted-fg); margin-bottom: 4px; }
    .muted { color: var(--muted-fg); font-size: 13px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-active { background: rgba(20,83,45,.6); color: #86efac; border: 1px solid rgba(22,101,52,.35); }
    .badge-idle { background: rgba(30,41,59,.6); color: var(--muted-fg); border: 1px solid var(--border); }
    h2 { font-size: 18px; font-weight: 600; }
    h3 { font-size: 15px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { border-bottom: 1px solid var(--border); }
    th { padding: 10px 8px; text-align: left; font-weight: 500; color: var(--muted-fg); font-size: 12px; }
    tbody tr { border-bottom: 1px solid rgba(30,41,59,.5); }
    tbody tr:hover { background: rgba(248,250,252,.02); }
    td { padding: 9px 8px; }
    pre { font-family: "Menlo","Monaco","Consolas",monospace; font-size: 12px; }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }

    /* login page */
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card { width: 100%; max-width: 380px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 32px; position: relative; }
    .theme-btn {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 999px;
      background: var(--btn-bg); color: var(--text); display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .theme-btn:hover { background: var(--btn-bg-hover); }
  </style>
  <script>
    (function () {
      var KEY = "cz_theme";
      function currentTheme() {
        return document.documentElement.getAttribute("data-theme") || "dark";
      }
      window.toggleTheme = function () {
        var next = currentTheme() === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem(KEY, next); } catch (_err) {}
        if (typeof window.syncThemeToggles === "function") window.syncThemeToggles();
      };
      window.syncThemeToggles = function () {
        var isDark = currentTheme() === "dark";
        document.querySelectorAll("[data-theme-icon]").forEach(function (el) {
          el.textContent = isDark ? "☀" : "☾";
        });
      };
      document.addEventListener("DOMContentLoaded", function () {
        window.syncThemeToggles();
      });
    })();
  </script>
</head>
<body>
{% block shell %}
<div class="app-shell">

  <div class="top-bar">
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')" aria-label="Menu">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128ZM40,72H216a8,8,0,0,0,0-16H40a8,8,0,0,0,0,16ZM216,184H40a8,8,0,0,0,0,16H216a8,8,0,0,0,0-16Z"/></svg>
    </button>
    <span style="font-weight:700;font-size:15px;">Coziyoo</span>
    <button class="theme-btn" type="button" onclick="toggleTheme()" aria-label="Toggle theme">
      <span data-theme-icon>☀</span>
    </button>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">

      <div class="sidebar-header">
        <div class="sidebar-logo-wrap">
          <div class="sidebar-logo-icon">
            <svg width="14" height="14" fill="var(--primary)" viewBox="0 0 256 256"><path d="M227.99,107.98a96.05,96.05,0,0,0-179.98,0A64,64,0,1,0,80,228.57a95.88,95.88,0,0,0,96,0A64,64,0,1,0,227.99,107.98ZM64,216a48,48,0,1,1,48-48A48.05,48.05,0,0,1,64,216Zm128,0a48,48,0,1,1,48-48A48.05,48.05,0,0,1,192,216Z"/></svg>
          </div>
          <span class="sidebar-logo-text">Coziyoo</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button class="theme-btn" type="button" onclick="toggleTheme()" aria-label="Toggle theme">
            <span data-theme-icon>☀</span>
          </button>
          <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
            <svg width="17" height="17" fill="currentColor" viewBox="0 0 256 256"><path d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm0,160H88V56H216V200ZM40,200V56H72V200Z"/></svg>
          </button>
        </div>
      </div>

      <div class="sidebar-org">
        <div class="sidebar-org-avatar">C</div>
        <span class="sidebar-org-name">Voice Agent</span>
      </div>

      <nav class="sidebar-nav">

        <div class="sidebar-section">BUILD</div>

        <a class="sidebar-item {% if request.url.path.startswith('/dashboard/assistants') or request.url.path.startswith('/dashboard/profiles') %}active{% endif %}" href="/dashboard/assistants">
          <div class="sidebar-item-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M117.25,157.92a60,60,0,1,0-66.5,0A95.83,95.83,0,0,0,3.53,195.63a8,8,0,1,0,13.4,8.74,80,80,0,0,1,134.14,0,8,8,0,0,0,13.4-8.74A95.83,95.83,0,0,0,117.25,157.92ZM40,108a44,44,0,1,1,44,44A44.05,44.05,0,0,1,40,108Zm210.14,98.7a8,8,0,0,1-11.07-2.33A79.83,79.83,0,0,0,172,168a8,8,0,0,1,0-16,44,44,0,1,0-16.34-84.87,8,8,0,1,1-5.94-14.85,60,60,0,0,1,55.53,105.64,95.83,95.83,0,0,1,47.22,37.71A8,8,0,0,1,250.14,206.7Z"/></svg></div>
          <span class="sidebar-item-label">Assistants</span>
        </a>

        <a class="sidebar-item {% if request.url.path.startswith('/dashboard/tools') %}active{% endif %}" href="/dashboard/tools">
          <div class="sidebar-item-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M218.67,65.34,193.4,90.6l-16-16L202.67,49.34a8,8,0,0,0-7.53-13.26A56,56,0,0,0,120,96c0,2.69.18,5.35.52,8L48,176a24,24,0,1,0,33.94,33.94l72-72.48c2.65.34,5.31.52,8,.52a56,56,0,0,0,56-56A54.9,54.9,0,0,0,218.67,65.34ZM54,198a8,8,0,1,1,8-8A8,8,0,0,1,54,198Z"/></svg></div>
          <span class="sidebar-item-label">Tools</span>
        </a>

        <a class="sidebar-item {% if request.url.path.startswith('/dashboard/phone-numbers') %}active{% endif %}" href="/dashboard/phone-numbers">
          <div class="sidebar-item-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M222.37,158.46l-47.11-21.11-.13-.06a16,16,0,0,0-15.17,1.4,8.12,8.12,0,0,0-.75.56L134.87,160c-15.42-7.49-31.34-23.29-38.83-38.56l21.78-25.07a7.46,7.46,0,0,0,.56-.75,16,16,0,0,0,1.32-15.06l0-.12L97.54,33.64a16,16,0,0,0-16.62-9.52A56.26,56.26,0,0,0,32,80c0,79.4,64.6,144,144,144a56.26,56.26,0,0,0,55.88-48.92A16,16,0,0,0,222.37,158.46Z"/></svg></div>
          <span class="sidebar-item-label">Phone Numbers</span>
        </a>

        <div class="sidebar-section">OBSERVE</div>

        <a class="sidebar-item {% if request.url.path.startswith('/dashboard/call-logs') %}active{% endif %}" href="/dashboard/call-logs">
          <div class="sidebar-item-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm64-88a8,8,0,0,1-8,8H128a8,8,0,0,1-8-8V72a8,8,0,0,1,16,0v48h48A8,8,0,0,1,192,128Z"/></svg></div>
          <span class="sidebar-item-label">Call Logs</span>
        </a>

        <div class="sidebar-section">MANAGE</div>

        <a class="sidebar-item {% if request.url.path.startswith('/dashboard/org/api-keys') %}active{% endif %}" href="/dashboard/org/api-keys">
          <div class="sidebar-item-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M216,72H180V56a52,52,0,0,0-104,0V72H40A16,16,0,0,0,24,88V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V88A16,16,0,0,0,216,72ZM92,56a36,36,0,0,1,72,0V72H92ZM216,200H40V88H216V200Zm-84-56a12,12,0,1,1,12,12A12,12,0,0,1,132,144Z"/></svg></div>
          <span class="sidebar-item-label">API Keys</span>
        </a>

        <a class="sidebar-item {% if request.url.path == '/dashboard/org' %}active{% endif %}" href="/dashboard/org">
          <div class="sidebar-item-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M240,208H224V96a16,16,0,0,0-16-16H144V48a16,16,0,0,0-24.88-13.32L39.12,82.91A16,16,0,0,0,32,96V208H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM208,96V208H144V96ZM48,96l80-48V208H48Z"/></svg></div>
          <span class="sidebar-item-label">Organization</span>
        </a>

      </nav>

      <div class="sidebar-footer">
        <form method="post" action="/dashboard/logout" style="margin:0;">
          <button type="submit" class="sidebar-item" style="width:100%;">
            <div class="sidebar-item-icon"><svg width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M120,216a8,8,0,0,1-8,8H48a16,16,0,0,1-16-16V48A16,16,0,0,1,48,32h64a8,8,0,0,1,0,16H48V208h64A8,8,0,0,1,120,216Zm109.66-93.66-40-40a8,8,0,0,0-11.32,11.32L204.69,120H112a8,8,0,0,0,0,16h92.69l-26.35,26.34a8,8,0,0,0,11.32,11.32l40-40A8,8,0,0,0,229.66,122.34Z"/></svg></div>
            <span class="sidebar-item-label" style="color:var(--muted-fg);">Sign out</span>
          </button>
        </form>
      </div>

    </div>
  </aside>

  <main class="main-content" id="main-content">
    {% block content %}{% endblock %}
  </main>
</div>
<script>
(function() {
  var K = 'cz_sidebar_c';
  var s = document.getElementById('sidebar');
  if (localStorage.getItem(K) === '1') s.classList.add('collapsed');
  window.toggleSidebar = function() {
    s.classList.toggle('collapsed');
    localStorage.setItem(K, s.classList.contains('collapsed') ? '1' : '0');
  };
  document.addEventListener('click', function(e) {
    if (window.innerWidth <= 640 && s.classList.contains('mobile-open')) {
      if (!s.contains(e.target) && !e.target.closest('.hamburger')) s.classList.remove('mobile-open');
    }
  });
})();
</script>
{% endblock %}
</body>
</html>
