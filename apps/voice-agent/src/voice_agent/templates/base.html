<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Coziyoo Dashboard{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0b1020; color: #e2e8f0; }
    .container { max-width: 1120px; margin: 0 auto; padding: 20px; }
    .card { background: #121a30; border: 1px solid #27314f; border-radius: 12px; padding: 16px; }
    .btn { border: 1px solid #334155; background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
    .btn:hover { border-color: #64748b; }
    .btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .input { width: 100%; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; padding: 8px; }
    .muted { color: #94a3b8; font-size: 13px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
    .badge-active { background: #14532d; color: #bbf7d0; border: 1px solid #166534; }
    .layout { display: grid; grid-template-columns: 300px 1fr; gap: 14px; }
    .list { display: flex; flex-direction: column; gap: 8px; }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
