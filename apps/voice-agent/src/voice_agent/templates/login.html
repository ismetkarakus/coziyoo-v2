{% extends "base.html" %}
{% block title %}Sign in — Coziyoo{% endblock %}
{% block shell %}
<div class="login-page">
  <div class="login-card">
    <button class="theme-btn" type="button" onclick="toggleTheme()" aria-label="Toggle theme" style="position:absolute;top:14px;right:14px;">
      <span data-theme-icon>☀</span>
    </button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px;">
      <div style="width:32px;height:32px;background:var(--p10);border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" fill="var(--primary)" viewBox="0 0 256 256"><path d="M227.99,107.98a96.05,96.05,0,0,0-179.98,0A64,64,0,1,0,80,228.57a95.88,95.88,0,0,0,96,0A64,64,0,1,0,227.99,107.98ZM64,216a48,48,0,1,1,48-48A48.05,48.05,0,0,1,64,216Zm128,0a48,48,0,1,1,48-48A48.05,48.05,0,0,1,192,216Z"/></svg>
      </div>
      <span style="font-size:18px;font-weight:700;">Coziyoo</span>
    </div>

    <h2 style="font-size:20px;margin-bottom:4px;">Sign in</h2>
    <p class="muted" style="margin-bottom:24px;">Voice Agent Dashboard</p>

    {% if error %}
    <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:10px 12px;font-size:13px;color:#fca5a5;margin-bottom:16px;">{{ error }}</div>
    {% endif %}

    <form method="post" action="/dashboard/login" style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <label>Email</label>
        <input class="input" type="email" name="email" value="admin@coziyoo.com" required autocomplete="email" />
      </div>
      <div>
        <label>Password</label>
        <input class="input" type="password" name="password" value="Admin12345" required autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:9px;">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
