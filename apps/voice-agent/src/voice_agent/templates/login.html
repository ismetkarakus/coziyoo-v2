{% extends "base.html" %}
{% block title %}Dashboard Login{% endblock %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 80px auto;">
  <h2 style="margin-top:0;">Admin Login</h2>
  <p class="muted">Sign in to manage voice agent profiles.</p>
  {% if error %}
  <div style="color:#fca5a5; margin-bottom:10px;">{{ error }}</div>
  {% endif %}
  <form method="post" action="/dashboard/login" style="display:flex; flex-direction:column; gap:10px;">
    <label>Email</label>
    <input class="input" type="email" name="email" value="admin@coziyoo.com" required />
    <label>Password</label>
    <input class="input" type="password" name="password" value="Admin12345" required />
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
</div>
{% endblock %}
