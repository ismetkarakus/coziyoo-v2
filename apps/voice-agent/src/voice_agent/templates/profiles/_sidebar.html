<div class="asst-list" id="profiles-sidebar" style="display:flex;flex-direction:column;height:100%;">

  <div class="asst-list-header">
    <input class="input" style="flex:1;" type="search" placeholder="Search…" oninput="filterAssistants(this.value)" />
    <form hx-post="/dashboard/assistants" hx-target="#profiles-sidebar" hx-swap="outerHTML" style="display:contents;" id="create-asst-form">
      <input type="hidden" name="name" value="New Assistant" />
      <button class="btn btn-sm btn-add" type="submit" title="Create new assistant">+ New</button>
    </form>
  </div>

  {% if message %}
  <div style="padding:8px 12px;font-size:12px;color:#fca5a5;border-bottom:1px solid var(--border);">{{ message }}</div>
  {% endif %}

  <div class="asst-list-items">
    {% for profile in profiles %}
    <div class="asst-row {% if (selected_profile_id|default('')) == profile.id %}selected{% endif %}" id="asst-row-{{ profile.id }}">
      <div class="asst-row-top">
        <button
          class="asst-name-btn"
          type="button"
          hx-get="/dashboard/profiles/{{ profile.id }}"
          hx-target="#profile-editor"
          hx-swap="innerHTML"
          onclick="selectAssistant('{{ profile.id }}')"
        >{{ profile.name }}</button>
        {% if profile.is_active %}
        <span class="badge badge-active" style="font-size:10px;">● Active</span>
        {% endif %}
      </div>
      <div class="asst-actions">
        {% if not profile.is_active %}
        <button class="btn btn-sm" type="button"
          hx-post="/dashboard/profiles/{{ profile.id }}/activate"
          hx-target="#profiles-sidebar" hx-swap="outerHTML"
          title="Set as active">Activate</button>
        {% endif %}
        <button class="btn btn-sm" type="button"
          hx-post="/dashboard/profiles/{{ profile.id }}/duplicate"
          hx-target="#profiles-sidebar" hx-swap="outerHTML"
          title="Duplicate">⊕</button>
        <button class="btn btn-sm btn-danger" type="button"
          hx-post="/dashboard/profiles/{{ profile.id }}/delete"
          hx-target="#profiles-sidebar" hx-swap="outerHTML"
          title="Delete"
          onclick="return confirm('Delete this assistant?')">✕</button>
      </div>
    </div>
    {% else %}
    <div style="padding:24px 12px;text-align:center;">
      <p class="muted" style="font-size:12px;">No assistants yet.</p>
      <p class="muted" style="font-size:12px;">Click <strong>+ New</strong> to create one.</p>
    </div>
    {% endfor %}
  </div>

</div>
<script>
  function selectAssistant(id) {
    document.querySelectorAll('.asst-row').forEach(r => r.classList.remove('selected'));
    var row = document.getElementById('asst-row-' + id);
    if (row) row.classList.add('selected');
  }
  function filterAssistants(q) {
    q = q.toLowerCase();
    document.querySelectorAll('.asst-row').forEach(function(row) {
      var btn = row.querySelector('.asst-name-btn');
      if (btn) row.style.display = btn.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }
</script>
