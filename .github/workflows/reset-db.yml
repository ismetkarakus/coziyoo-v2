name: Reset Database

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm. ALL DATA WILL BE DELETED.'
        required: true
        default: ''
      seed_sample_data:
        description: 'Also seed sample data (buyers, sellers, orders)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  reset-db:
    name: Reset database on servers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_TARGETS: ${{ secrets.DEPLOY_TARGETS }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
    steps:
      - name: Validate confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "yes" ]]; then
            echo "ERROR: You must type 'yes' in the confirm field to proceed." >&2
            exit 1
          fi

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_TARGETS}" ]]; then
            echo "ERROR: Missing required secret: DEPLOY_TARGETS" >&2
            exit 1
          fi
          if [[ -z "${DEPLOY_SSH_KEY}" ]]; then
            echo "ERROR: Missing required secret: DEPLOY_SSH_KEY" >&2
            exit 1
          fi

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf "%s" "${DEPLOY_SSH_KEY}" | sed 's/[[:space:]]*$//' > "${HOME}/.ssh/id_ed25519"
          echo "" >> "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keygen -y -f "${HOME}/.ssh/id_ed25519" > /dev/null \
            || { echo "ERROR: DEPLOY_SSH_KEY is not a valid private key" >&2; exit 1; }

      - name: Trust target host keys
        run: |
          set -euo pipefail
          trim() { local s="$1"; s="${s%$'\r'}"; s="${s#"${s%%[![:space:]]*}"}"; s="${s%"${s##*[![:space:]]}"}"; printf "%s" "${s}"; }
          strip_all_ws() { printf "%s" "$1" | tr -d '[:space:]'; }

          touch "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

          if [[ -n "${DEPLOY_KNOWN_HOSTS:-}" ]]; then
            printf "%s\n" "${DEPLOY_KNOWN_HOSTS}" >> "${HOME}/.ssh/known_hosts"
            sort -u "${HOME}/.ssh/known_hosts" -o "${HOME}/.ssh/known_hosts"
            echo "Loaded host keys from DEPLOY_KNOWN_HOSTS secret."
            exit 0
          fi

          while IFS='|' read -r NAME HOST USER PORT REPO_PATH; do
            NAME="$(trim "${NAME:-}")"; HOST="$(trim "${HOST:-}")"; PORT="$(trim "${PORT:-}")"
            [[ -z "${NAME}${HOST}" ]] && continue
            [[ "${NAME}" =~ ^# ]]    && continue
            HOST="$(strip_all_ws "${HOST:-${NAME}}")"; PORT="$(strip_all_ws "${PORT:-22}")"
            for attempt in 1 2 3; do
              KEYSCAN_OUTPUT="$(ssh-keyscan -p "${PORT}" -T 15 -H "${HOST}" 2>/dev/null || true)"
              if [[ -n "${KEYSCAN_OUTPUT}" ]]; then
                printf "%s\n" "${KEYSCAN_OUTPUT}" >> "${HOME}/.ssh/known_hosts"
                break
              fi
              [[ "${attempt}" -eq 3 ]] && { echo "ERROR: ssh-keyscan failed for ${HOST}:${PORT}" >&2; exit 1; }
              sleep 5
            done
          done <<< "${DEPLOY_TARGETS}"
          sort -u "${HOME}/.ssh/known_hosts" -o "${HOME}/.ssh/known_hosts"

      - name: Reset database on each server
        run: |
          set -euo pipefail
          trim() { local s="$1"; s="${s%$'\r'}"; s="${s#"${s%%[![:space:]]*}"}"; s="${s%"${s##*[![:space:]]}"}"; printf "%s" "${s}"; }
          strip_all_ws() { printf "%s" "$1" | tr -d '[:space:]'; }

          SEED_SAMPLE="${{ github.event.inputs.seed_sample_data }}"
          FAILED_HOSTS=()

          while IFS='|' read -r NAME HOST USER PORT REPO_PATH; do
            NAME="$(trim "${NAME:-}")"; HOST="$(trim "${HOST:-}")"; USER="$(trim "${USER:-}")"; PORT="$(trim "${PORT:-}")"; REPO_PATH="$(trim "${REPO_PATH:-}")"
            [[ -z "${NAME}${HOST}" ]] && continue
            [[ "${NAME}" =~ ^# ]]    && continue
            HOST="$(strip_all_ws "${HOST:-${NAME}}")"; USER="$(strip_all_ws "${USER:-root}")"; PORT="$(strip_all_ws "${PORT:-22}")"
            REPO_PATH="${REPO_PATH:-/opt/coziyoo}"

            echo ""
            echo "======================================================="
            echo " Resetting DB on: ${NAME:-${HOST}}"
            echo "   Target: ${USER}@${HOST}:${PORT}  Repo: ${REPO_PATH}"
            echo "======================================================="

            if ssh \
                -i "${HOME}/.ssh/id_ed25519" \
                -p "${PORT}" \
                -o StrictHostKeyChecking=yes \
                -o BatchMode=yes \
                -o ConnectTimeout=30 \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=4 \
                "${USER}@${HOST}" \
                "set -euo pipefail
                 cd '${REPO_PATH}'
                 RESET_DB_SKIP_CONFIRM=true SEED_SAMPLE_DATA='${SEED_SAMPLE}' bash installation/scripts/reset-db.sh"; then
              echo "  ✓ Reset succeeded for ${NAME:-${HOST}}"
            else
              echo "  ✗ Reset FAILED for ${NAME:-${HOST}}" >&2
              FAILED_HOSTS+=("${NAME:-${HOST}}")
            fi
          done <<< "${DEPLOY_TARGETS}"

          if [[ "${#FAILED_HOSTS[@]}" -gt 0 ]]; then
            echo "ERROR: Reset failed on ${#FAILED_HOSTS[@]} host(s): ${FAILED_HOSTS[*]}" >&2
            exit 1
          fi
          echo ""
          echo "All database resets finished successfully."
