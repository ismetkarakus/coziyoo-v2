name: Deploy On Push

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to servers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_TARGETS: ${{ secrets.DEPLOY_TARGETS }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH || 'main' }}
      DEPLOY_DEMO_DB_REBUILD: ${{ vars.DEPLOY_DEMO_DB_REBUILD || 'false' }}
      DEPLOY_DEMO_DB_REBUILD_ON_SCHEMA_CHANGE: ${{ vars.DEPLOY_DEMO_DB_REBUILD_ON_SCHEMA_CHANGE || 'true' }}
      DEPLOY_DEMO_DB_RESEED: ${{ vars.DEPLOY_DEMO_DB_RESEED || 'true' }}
      DEPLOY_ADMIN_SYNC_ON_UPDATE: ${{ vars.DEPLOY_ADMIN_SYNC_ON_UPDATE || 'true' }}
      DEPLOY_ADMIN_EMAIL: ${{ vars.DEPLOY_ADMIN_EMAIL || 'admin@coziyoo.com' }}
      DEPLOY_ADMIN_PASSWORD: ${{ secrets.DEPLOY_ADMIN_PASSWORD || 'Admin12345' }}
    steps:
      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_TARGETS}" ]]; then
            echo "Missing required secret: DEPLOY_TARGETS" >&2
            exit 1
          fi
          if [[ -z "${DEPLOY_SSH_KEY}" ]]; then
            echo "Missing required secret: DEPLOY_SSH_KEY" >&2
            exit 1
          fi

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf "%s" "${DEPLOY_SSH_KEY}" | sed 's/[[:space:]]*$//' > "${HOME}/.ssh/id_ed25519"
          echo "" >> "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keygen -y -f "${HOME}/.ssh/id_ed25519" > /dev/null \
            || { echo "Invalid DEPLOY_SSH_KEY private key" >&2; exit 1; }

      - name: Trust target host keys
        run: |
          set -euo pipefail
          trim() {
            local s="$1"
            s="${s%$'\r'}"
            s="${s#"${s%%[![:space:]]*}"}"
            s="${s%"${s##*[![:space:]]}"}"
            printf "%s" "${s}"
          }
          strip_all_ws() {
            printf "%s" "$1" | tr -d '[:space:]'
          }

          touch "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

          while IFS='|' read -r NAME HOST USER PORT REPO_PATH; do
            NAME="$(trim "${NAME:-}")"
            HOST="$(trim "${HOST:-}")"
            USER="$(trim "${USER:-}")"
            PORT="$(trim "${PORT:-}")"
            REPO_PATH="$(trim "${REPO_PATH:-}")"
            [[ -z "${NAME}${HOST}${USER}${PORT}${REPO_PATH}" ]] && continue
            [[ "${NAME}" =~ ^# ]] && continue

            HOST="${HOST:-${NAME}}"
            PORT="${PORT:-22}"
            HOST="$(strip_all_ws "${HOST}")"
            PORT="$(strip_all_ws "${PORT}")"

            if [[ -z "${HOST}" ]]; then
              echo "Invalid DEPLOY_TARGETS row: missing host" >&2
              exit 1
            fi
            if ! [[ "${PORT}" =~ ^[0-9]+$ ]]; then
              echo "Invalid DEPLOY_TARGETS row: invalid port '${PORT}'" >&2
              exit 1
            fi

            for attempt in 1 2 3; do
              if ssh-keyscan -p "${PORT}" -T 15 -H "${HOST}" >> "${HOME}/.ssh/known_hosts" 2>/dev/null; then
                break
              fi
              if [[ "${attempt}" -eq 3 ]]; then
                echo "ssh-keyscan failed for ${HOST}:${PORT}" >&2
                exit 1
              fi
              sleep 5
            done
          done <<< "${DEPLOY_TARGETS}"
          sort -u "${HOME}/.ssh/known_hosts" -o "${HOME}/.ssh/known_hosts"

      - name: Deploy
        run: |
          set -euo pipefail
          trim() {
            local s="$1"
            s="${s%$'\r'}"
            s="${s#"${s%%[![:space:]]*}"}"
            s="${s%"${s##*[![:space:]]}"}"
            printf "%s" "${s}"
          }
          strip_all_ws() {
            printf "%s" "$1" | tr -d '[:space:]'
          }

          while IFS='|' read -r NAME HOST USER PORT REPO_PATH; do
            NAME="$(trim "${NAME:-}")"
            HOST="$(trim "${HOST:-}")"
            USER="$(trim "${USER:-}")"
            PORT="$(trim "${PORT:-}")"
            REPO_PATH="$(trim "${REPO_PATH:-}")"
            [[ -z "${NAME}${HOST}${USER}${PORT}${REPO_PATH}" ]] && continue
            [[ "${NAME}" =~ ^# ]] && continue

            HOST="${HOST:-${NAME}}"
            USER="${USER:-root}"
            PORT="${PORT:-22}"
            REPO_PATH="${REPO_PATH:-/opt/coziyoo}"
            HOST="$(strip_all_ws "${HOST}")"
            USER="$(strip_all_ws "${USER}")"
            PORT="$(strip_all_ws "${PORT}")"

            if [[ -z "${HOST}" ]]; then
              echo "Invalid DEPLOY_TARGETS row: missing host" >&2
              exit 1
            fi
            if [[ -z "${USER}" ]]; then
              echo "Invalid DEPLOY_TARGETS row: missing user" >&2
              exit 1
            fi
            if ! [[ "${PORT}" =~ ^[0-9]+$ ]]; then
              echo "Invalid DEPLOY_TARGETS row: invalid port '${PORT}'" >&2
              exit 1
            fi

            echo "Deploying ${NAME:-${HOST}} (${USER}@${HOST}:${PORT}, repo=${REPO_PATH})"

            ssh -i "${HOME}/.ssh/id_ed25519" \
              -p "${PORT}" \
              -o StrictHostKeyChecking=yes \
              -o BatchMode=yes \
              "${USER}@${HOST}" \
              "set -euo pipefail; cd '${REPO_PATH}'; GIT_UPDATE=true DEPLOY_BRANCH='${DEPLOY_BRANCH}' RUN_DB_MIGRATIONS_ON_UPDATE=true DEMO_DB_REBUILD_ON_UPDATE='${DEPLOY_DEMO_DB_REBUILD}' DEMO_DB_REBUILD_ON_SCHEMA_CHANGE='${DEPLOY_DEMO_DB_REBUILD_ON_SCHEMA_CHANGE}' DEMO_DB_RESEED_ON_UPDATE='${DEPLOY_DEMO_DB_RESEED}' ADMIN_SYNC_ON_UPDATE='${DEPLOY_ADMIN_SYNC_ON_UPDATE}' ADMIN_SYNC_EMAIL='${DEPLOY_ADMIN_EMAIL}' ADMIN_SYNC_PASSWORD='${DEPLOY_ADMIN_PASSWORD}' bash installation/scripts/update_all.sh"
          done <<< "${DEPLOY_TARGETS}"
